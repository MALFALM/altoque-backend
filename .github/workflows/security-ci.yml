name: Backend Security CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-and-static-security:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit and integration tests
        run: npm run test:ci

      - name: ESLint security rules
        run: npm run lint

      - name: npm audit
        run: npm run audit

      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/default
            p/javascript
            p/owasp-top-ten

      - name: Secret scanning with TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  zap-baseline:
    runs-on: ubuntu-latest
    needs: test-and-static-security

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: altoque_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      PORT: 3000
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: altoque_db
      JWT_SECRET: ci_secret_with_enough_length_for_tests
      CORS_ORIGIN: http://localhost:5173,http://127.0.0.1:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Load database schema
        run: mysql -h 127.0.0.1 -uroot -proot < database/altoque_db.sql

      - name: Start backend
        run: |
          npm start &
          echo $! > server.pid

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: ZAP baseline scan
        run: |
          mkdir -p zap-reports
          docker run --rm --network host \
            -v "${{ github.workspace }}:/zap/wrk/:rw" \
            -w /zap/wrk \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://127.0.0.1:3000 \
            -a \
            -m 3 \
            -T 60 \
            -r zap-reports/zap-baseline-report.html \
            -J zap-reports/zap-baseline-report.json \
            -w zap-reports/zap-baseline-report.md \
            -I
          chmod -R a+r zap-reports

      - name: List ZAP reports
        if: always()
        run: ls -la zap-reports

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-report
          path: zap-reports/
          if-no-files-found: error
